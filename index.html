<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>붓끝에 담은 노래, 삶의 성찰</title>

<!-- ============================================
     구글 폰트 불러오기
     - 제목용: Noto Serif KR (묵직하고 정갈한 명조 계열)
     - 본문용: Nanum Myeongjo (붓글씨 느낌이 살짝 도는 세리프체)
============================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700;900&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">

<style>
  /* ============================================
     0. 공통 변수 (색상 / 여백 등을 한 곳에서 관리)
     - 나중에 색을 바꾸고 싶으면 이 부분의 값만 수정하면 됩니다.
  ============================================ */
  :root {
    --color-bg: #F3EEE1;          /* 배경: 차분한 크림/베이지 */
    --color-bg-soft: #ECE4D2;     /* 배경보다 살짝 진한 톤 (구획 구분용) */
    --color-ink: #2E2A24;         /* 먹빛 검정 (제목/본문 텍스트) */
    --color-ink-soft: #5C5648;    /* 흐린 먹빛 (부제, 설명 텍스트) */
    --color-seal: #9C3B2E;        /* 낙관(도장) 붉은색 포인트 */
    --color-seal-dark: #7E2E23;   /* 낙관 hover 시 진한 색 */
    --color-line: #C9BFA5;        /* 은은한 구분선 색 */
    --max-width: 720px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background-color: var(--color-bg);
    color: var(--color-ink);
    font-family: 'Nanum Myeongjo', serif;
    line-height: 1.7;
    /* 은은한 종이 질감을 위한 미세한 방사형 그라데이션 */
    background-image:
      radial-gradient(circle at 20% 20%, rgba(0,0,0,0.015) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02) 0%, transparent 45%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    overflow-x: hidden;
  }

  /* ============================================
     1. 전체를 감싸는 컨테이너
  ============================================ */
  .page {
    width: 100%;
    max-width: var(--max-width);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* ============================================
     2. 상단 낙관(도장) 장식 - 서예가의 도장을 형상화
  ============================================ */
  .seal {
    width: 52px;
    height: 52px;
    border: 2px solid var(--color-seal);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-seal);
    font-family: 'Noto Serif KR', serif;
    font-weight: 900;
    font-size: 22px;
    margin-bottom: 28px;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.9s ease forwards;
    animation-delay: 0.1s;
    letter-spacing: -1px;
  }

  /* ============================================
     3. 상단 타이틀 영역
  ============================================ */
  .title-area {
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-weight: 700;
    font-size: clamp(28px, 5vw, 44px);
    color: var(--color-ink);
    line-height: 1.4;
    letter-spacing: -0.5px;
    opacity: 0;
    transform: translateY(14px);
    animation: fadeUp 0.9s ease forwards;
    animation-delay: 0.25s;
  }

  .subtitle {
    margin-top: 18px;
    font-size: clamp(15px, 2.4vw, 18px);
    color: var(--color-ink-soft);
    font-weight: 400;
    letter-spacing: 0.2px;
    opacity: 0;
    transform: translateY(14px);
    animation: fadeUp 0.9s ease forwards;
    animation-delay: 0.45s;
  }

  /* ============================================
     4. 붓터치 느낌의 구분선 (SVG)
     - 실제 이미지 파일 없이 SVG 코드로 직접 그린 붓자국입니다.
  ============================================ */
  .brush-divider {
    width: 160px;
    height: 24px;
    margin: 36px 0 44px 0;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards;
    animation-delay: 0.65s;
  }
  .brush-divider svg {
    width: 100%;
    height: 100%;
  }
  .brush-divider path {
    fill: var(--color-ink-soft);
    opacity: 0.55;
  }

  /* ============================================
     5. 중앙 버튼 2개 영역 (가장 중요한 부분)
  ============================================ */
  .buttons {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 20px;
    opacity: 0;
    transform: translateY(14px);
    animation: fadeUp 0.9s ease forwards;
    animation-delay: 0.85s;
  }

  .main-btn {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 26px 20px;
    background-color: #FBF8F0;
    border: 1px solid var(--color-line);
    border-radius: 4px;
    text-decoration: none;
    color: var(--color-ink);
    font-family: 'Noto Serif KR', serif;
    transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease, background-color 0.35s ease;
    box-shadow: 0 1px 2px rgba(46, 42, 36, 0.04);
    overflow: hidden;
  }

  /* 버튼 안, 굵은 제목 텍스트 */
  .main-btn .btn-title {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  /* 버튼 안, 작은 보조 설명 텍스트 */
  .main-btn .btn-desc {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 13px;
    color: var(--color-ink-soft);
    font-weight: 400;
  }

  /* 버튼 왼쪽에 붉은 낙관색 세로선 (hover 시 나타남) */
  .main-btn::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 4px;
    background-color: var(--color-seal);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.35s ease;
  }

  .main-btn:hover {
    transform: translateY(-4px);
    border-color: var(--color-seal);
    background-color: #FDFBF5;
    box-shadow: 0 10px 24px rgba(46, 42, 36, 0.08);
  }

  .main-btn:hover::before {
    transform: scaleY(1);
  }

  .main-btn:active {
    transform: translateY(-1px);
  }

  .main-btn:focus-visible {
    outline: 2px solid var(--color-seal);
    outline-offset: 3px;
  }

  /* ============================================
     6. 하단 푸터
  ============================================ */
  footer {
    margin-top: 60px;
    font-size: 12.5px;
    color: var(--color-ink-soft);
    opacity: 0;
    animation: fadeIn 1s ease forwards;
    animation-delay: 1.1s;
    letter-spacing: 0.3px;
  }

  /* ============================================
     7. 애니메이션 정의
  ============================================ */
  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* 사용자가 '동작 줄이기'를 설정해 둔 경우 애니메이션 최소화 */
  @media (prefers-reduced-motion: reduce) {
    .seal, h1, .subtitle, .brush-divider, .buttons, footer, .main-btn {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
    }
  }

  /* ============================================
     8. 반응형 - 모바일 화면 대응 (480px 이하)
  ============================================ */
  @media (max-width: 480px) {
    body {
      padding: 32px 20px;
    }
    .main-btn {
      padding: 22px 16px;
    }
    .seal {
      width: 44px;
      height: 44px;
      font-size: 18px;
    }
  }
</style>
</head>
<body>

<div class="page">

  <!-- 상단 낙관(도장) 장식: 원하는 한 글자로 바꿔도 좋습니다 (예: 성함의 성씨 등) -->
  <div class="seal" aria-hidden="true">大</div>

  <!-- 1. 상단 타이틀 영역 -->
  <div class="title-area">
    <h4>먹 한 방울, 문장 한 줄<br>에 담긴 하루를 나눕니다</h4>
  </div>

  <!-- 붓터치 구분선 (SVG로 직접 그린 붓 자국) -->
  <div class="brush-divider" aria-hidden="true">
    <svg viewBox="0 0 160 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M2,14 C20,4 40,20 60,10 C80,2 100,18 120,8 C135,2 150,10 158,6 C158,10 158,14 158,16 C140,20 120,10 100,16 C80,22 60,8 40,16 C22,22 6,18 2,18 Z"/>
    </svg>
  </div>

  <!-- 2. 중앙 버튼 2개 -->
  <div class="buttons">

    <!-- 첫 번째 버튼: 서예 포트폴리오 -->
    <!-- ⭐ 나중에 아래 href="#" 부분에 실제 주소를 넣어주세요 -->
    <a href="https://storm-princess-ffb.notion.site/39606fc3f79c80eab051c6b7ffc9cd43?source=copy_link" class="main-btn">
      <span class="btn-title">서예 포트폴리오 보러가기</span>
      <span class="btn-desc">먹으로 쓴 글씨, 그 안에 담긴 마음</span>
    </a>

    <!-- 두 번째 버튼: 노래와 삶의 성찰 -->
    <!-- ⭐ 나중에 아래 href="#" 부분에 실제 주소를 넣어주세요 -->
    <a href="https://storm-princess-ffb.notion.site/39606fc3f79c80dd95bcfe6475968c6f?source=copy_link" class="main-btn">
      <span class="btn-title">노래와 삶의 성찰 보러가기</span>
      <span class="btn-desc">가사가 되지 못한 기도, 그리고 묵상</span>
    </a>

  </div>

  <!-- 하단 푸터 -->
  <footer>
    © 2026 곽대영
  </footer>

</div>

<script>
  // ============================================
  // JavaScript 영역
  // 지금은 특별한 기능이 없지만, 나중에 방문자 수 세기,
  // 다크모드 전환 버튼 등을 추가하고 싶을 때 이 자리에 코드를 넣으면 됩니다.
  // ============================================

  // 예시: 버튼을 눌렀을 때 href가 아직 "#"이면 안내 메시지 띄우기
  // (나중에 실제 주소를 넣으면 이 알림은 자동으로 사라집니다)
  document.querySelectorAll('.main-btn').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      if (btn.getAttribute('href') === '#') {
        e.preventDefault();
        alert('아직 연결할 페이지 주소가 입력되지 않았어요.\n버튼의 href="#" 부분에 실제 주소를 넣어주세요!');
      }
    });
  });
</script>

</body>
</html>
